version: "3.9"

# ── Shared build context is the monorepo root ─────────────────────────────────
# Both API and frontend Dockerfiles are multi-stage and reference workspace
# packages, so they must be built from the project root, not their own dirs.

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

services:
  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    <<: [*restart, *logging]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      lendora
      MYSQL_USER:          lendora
      MYSQL_PASSWORD:      ${DB_PASSWORD:-lendorapass}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: [*restart, *logging]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── API (Node / Express) ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    <<: [*restart, *logging]
    env_file: .env
    environment:
      NODE_ENV:     production
      PORT:         4000
      DATABASE_URL: mysql://lendora:${DB_PASSWORD:-lendorapass}@mysql:3306/lendora
      REDIS_URL:    redis://redis:6379
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/apps/api/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
    <<: [*restart, *logging]
    env_file: .env
    environment:
      NODE_ENV:              production
      NEXT_PUBLIC_API_URL:   ${API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Nginx (reverse proxy + TLS termination) ───────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: [*restart, *logging]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  uploads:
