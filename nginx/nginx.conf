user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections  1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────────────────
  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_buffers      16 8k;
  gzip_http_version 1.1;
  gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # ── Rate-limit zones ──────────────────────────────────────────────────────
  # Auth endpoints: 10 req/min per IP — stops brute-force
  limit_req_zone $binary_remote_addr zone=auth:10m    rate=10r/m;
  # General API: 120 req/min per IP
  limit_req_zone $binary_remote_addr zone=api:10m     rate=120r/m;
  # Payment webhooks: 30 req/min (gateways retry, so can't be too strict)
  limit_req_zone $binary_remote_addr zone=payment:10m rate=30r/m;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream api_upstream {
    server api:4000;
    keepalive 32;
  }

  upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS main ───────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name lendora.com.bd www.lendora.com.bd;

    # TLS — mount real certs or a self-signed cert for local dev
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"          always;
    add_header X-Content-Type-Options    "nosniff"             always;
    add_header X-XSS-Protection          "1; mode=block"       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 20M;

    # ── Auth routes (strict rate limit) ─────────────────────────────────────
    location ~ ^/api/(auth|users/register) {
      limit_req zone=auth burst=5 nodelay;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Payment callbacks (gateway-sourced webhooks) ─────────────────────────
    location ~ ^/api/payments/(bkash|nagad)/callback {
      limit_req zone=payment burst=10 nodelay;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    # ── General API proxy ───────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass http://api_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Uploaded files served directly from volume ──────────────────────────
    location /uploads/ {
      alias /var/www/uploads/;
      expires 7d;
      add_header Cache-Control "public, immutable";
      add_header X-Content-Type-Options "nosniff" always;
      # Strip directory listing
      autoindex off;
    }

    # ── Next.js static assets with long-term caching ─────────────────────────
    location /_next/static/ {
      proxy_pass http://frontend_upstream;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # ── Next.js image optimization ───────────────────────────────────────────
    location /_next/image {
      proxy_pass http://frontend_upstream;
      include /etc/nginx/proxy_params.conf;
    }

    # ── Frontend (catch-all) ─────────────────────────────────────────────────
    location / {
      proxy_pass http://frontend_upstream;
      include /etc/nginx/proxy_params.conf;
    }
  }
}
