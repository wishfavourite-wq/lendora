[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9.15.0 --force && pnpm install --frozen-lockfile && pnpm --filter @lendora/database run db:generate && pnpm --filter @lendora/shared run build && (pnpm --filter @lendora/api run build || true)"

[deploy]
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
