[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@9.15.0 --force && pnpm install --frozen-lockfile && pnpm --filter @lendora/database run db:generate && pnpm --filter @lendora/database run db:deploy && pnpm --filter @lendora/database run db:seed && pnpm --filter @lendora/shared run build && pnpm --filter @lendora/api run build"

[deploy]
startCommand = "node apps/api/dist/main.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
